server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Cache hashed static assets (1 year)
    location ~* \.[0-9a-f]{16,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache translation files (short cache)
    location /assets/i18n/ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
